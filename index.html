<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars - Official Rewards Portal</title>
    <style>
        :root {
            --primary-blue: #2b5ce6;
            --supercell-purple: linear-gradient(180deg, #8e66ff 0%, #4a1fbc 100%);
            --accent-green: #afff00;
            --btn-blue: linear-gradient(180deg, #00a2ff 0%, #005fcc 100%);
        }

        body {
            background: var(--primary-blue);
            background-image: radial-gradient(rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 40px 40px;
            font-family: 'Arial Black', sans-serif;
            margin: 0; color: white; overflow-x: hidden;
            user-select: none;
        }

        /* High-Level Animation: Floating */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        /* 1. Header Section */
        header {
            text-align: center; padding: 30px 10px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
        }
        .logo { 
            width: 150px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
            animation: float 3s ease-in-out infinite;
        }

        .stats-container {
            display: flex; justify-content: center; gap: 20px; margin-top: 20px;
        }
        .stat-card {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px; padding: 10px 20px; min-width: 100px;
            backdrop-filter: blur(5px);
        }
        .stat-label { font-size: 10px; opacity: 0.8; letter-spacing: 1px; }
        .stat-number { display: block; font-size: 20px; font-weight: 900; color: #fff; }

        /* 2. Main Grid (The high-end UI) */
        .rewards-wrapper {
            width: 94%; max-width: 500px; margin: 0 auto;
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 35px; padding: 20px; box-sizing: border-box;
        }
        .grid-header { text-align: center; font-size: 16px; margin-bottom: 20px; text-shadow: 0 2px 4px #000; }

        .rewards-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
        }

        /* Item Card Logic */
        .item-card {
            background: var(--supercell-purple); border: 2px solid #a385ff;
            border-radius: 18px; padding: 12px 5px; text-align: center;
            position: relative; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 #31158a;
        }
        .item-card:hover { transform: scale(1.03); }
        .item-card:active { transform: translateY(4px); box-shadow: 0 2px 0 #31158a; }

        .item-name { font-size: 9px; font-weight: 900; height: 26px; line-height: 1; text-transform: uppercase; }
        .item-image { 
            width: 100%; height: 75px; object-fit: contain; margin: 8px 0;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4));
        }

        .price-area { margin-bottom: 10px; }
        .old-price { font-size: 8px; text-decoration: line-through; color: var(--accent-green); opacity: 0.7; }
        .free-label { font-size: 10px; color: var(--accent-green); font-weight: 900; }

        .btn-action {
            background: var(--btn-blue); border: 1px solid #00d9ff;
            border-radius: 6px; color: white; font-weight: 900;
            padding: 8px 0; width: 100%; font-size: 11px;
            box-shadow: 0 3px 0 #003a80; cursor: pointer;
        }

        /* 3. Advanced Popup System */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 999;
        }
        .modal-content {
            background: #1e7d22; border: 6px solid #fff; border-radius: 25px;
            width: 88%; max-width: 400px; padding: 0; overflow: hidden;
            animation: popIn 0.3s ease-out;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-header { background: #000; padding: 15px; text-align: center; font-size: 18px; font-weight: 900; }
        .modal-body { padding: 25px; text-align: center; }

        .input-field {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-size: 20px; font-family: 'Arial Black'; text-align: center;
            background: #fff; color: #333; margin-bottom: 20px; box-sizing: border-box;
        }

        /* 4. Footer */
        footer {
            background: #000; width: 100%; padding: 50px 25px; margin-top: 60px;
            box-sizing: border-box; color: #666; font-size: 11px; line-height: 1.8;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/7/7a/Brawl_Stars_logo.svg/1200px-Brawl_Stars_logo.svg.png" class="logo">
        <div class="stats-container">
            <div class="stat-card"><span class="stat-label">CLAIMS TODAY</span><span class="stat-number" id="claimCount">3,122</span></div>
            <div class="stat-card"><span class="stat-label">ONLINE</span><span class="stat-number">1,095</span></div>
        </div>
    </header>

    <main class="rewards-wrapper">
        <div class="grid-header">SELECT YOUR PACKAGE</div>
        <div class="rewards-grid" id="mainGrid">
            </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">ENTER PLAYER TAG</div>
            <div class="modal-body">
                <input type="text" class="input-field" id="tagInput" placeholder="#8YVGP29..." maxlength="12">
                <button class="btn-action" style="padding:15px; font-size:16px;" onclick="validateTag()">CONNECT ACCOUNT</button>
                <div id="loader" style="display:none; margin-top:15px; font-weight:900;">
                    <div class="spinner"></div> CONNECTING...
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div style="float:right"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Supercell_logo.svg/1200px-Supercell_logo.svg.png" width="100"></div>
        <p>Terms of Service | Privacy Policy | Parent's Guide</p>
        <p>© 2026 Supercell Oy. All rights reserved.</p>
    </footer>

    <script>
        const items = [
            { name: "ULTRA CHAOS DROPS", img: "https://i.ibb.co/vzVf6n4/chaos-drop.png", old: "$2.99", free: "X6 FREE" },
            { name: "2000 GEMS PACK", img: "https://i.ibb.co/V2fXQzD/gems.png", old: "$19.99", free: "X24 FREE" },
            { name: "STARR NOVA BOX", img: "https://i.ibb.co/8YhG0vX/starr-box.png", old: "$24.99", free: "X100 FREE" },
            { name: "STARR NOVA SKIN", img: "https://i.ibb.co/F4pYmC0/nova-skin.png", old: "$14.99", free: "X1 FREE" },
            { name: "NOVA DROP", img: "https://i.ibb.co/sW2m9M9/nova-drop.png", old: "$1.99", free: "X10 FREE" },
            { name: "DAMIAN BOX", img: "https://i.ibb.co/G3XmY7P/damian-box.png", old: "$9.99", free: "X1 FREE" },
            { name: "BOLT SKIN", img: "https://i.ibb.co/m0fH4Y3/bolt-skin.png", old: "$4.99", free: "X1 FREE" },
            { name: "BOLT BOX", img: "https://i.ibb.co/9G0z6vB/bolt-box.png", old: "$9.99", free: "X50 FREE" },
            { name: "KAZE BRAWLER", img: "https://i.ibb.co/6y4t8Xn/kaze.png", old: "$8.99", free: "X1 FREE" }
        ];

        const grid = document.getElementById('mainGrid');
        items.forEach(item => {
            grid.innerHTML += `
                <div class="item-card" onclick="openModal()">
                    <div class="item-name">${item.name}</div>
                    <img src="${item.img}" class="item-image">
                    <div class="price-area">
                        <span class="old-price">${item.old}</span><br>
                        <span class="free-label">${item.free}</span>
                    </div>
                    <button class="btn-action">CLAIM</button>
                </div>
            `;
        });

        function openModal() { document.getElementById('modal').style.display = 'flex'; }

        function validateTag() {
            const input = document.getElementById('tagInput').value;
            if(input.length < 4) return alert("Enter a valid Tag!");
            
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                window.location.href = "https://your-cpa-link.com"; // YOUR CPA LINK
            }, 2000);
        }

        // Counter Animation
        setInterval(() => {
            const el = document.getElementById('claimCount');
            el.innerText = (parseInt(el.innerText) + Math.floor(Math.random() * 3)).toLocaleString();
        }, 3000);
    </script>
</body>
</html>
