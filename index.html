<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash Royale Reward</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NPNW091TKK"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-NPNW091TKK');
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
padding:15px;
}
.container{
background:rgba(0,0,0,.95);
padding:45px;
border-radius:25px;
width:95%;
max-width:400px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,.9);
}
h1{
font-size:28px;
margin-bottom:15px;
color:#ffd700;
}
p{
font-size:16px;
color:#ccc;
margin-bottom:25px;
}
input{
padding:14px;
width:90%;
border:none;
border-radius:10px;
margin-bottom:20px;
font-size:15px;
}
.button{
background:#ffcc00;
color:#000;
padding:18px;
width:100%;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}
.button:hover{transform:scale(1.05)}
.progress{
margin-top:20px;
background:#222;
border-radius:15px;
overflow:hidden;
height:12px;
}
.bar{
height:12px;
width:0%;
background:#00ff88;
transition:width .4s;
}
.timer{
margin-top:10px;
font-size:13px;
color:#ff4444;
}
.stats{
margin-top:20px;
font-size:15px;
color:#3b82f6;
}
.small{
margin-top:15px;
font-size:11px;
color:#777;
}

/* TikTok Overlay */
#ttOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.96);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
z-index:999999;
}
#ttOverlay h2{
color:#fff;
font-size:28px;
margin-bottom:10px;
}
#ttOverlay p{
color:#ccc;
margin-bottom:20px;
}
#ttOverlay button{
background:#3b82f6;
color:#fff;
border:none;
padding:14px 22px;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* Locker Modal */
#lockerModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
justify-content:center;
align-items:center;
z-index:999998;
padding:15px;
}
.lockerBox{
width:100%;
max-width:500px;
height:85vh;
background:#111;
border-radius:18px;
overflow:hidden;
position:relative;
box-shadow:0 0 35px rgba(0,0,0,.7);
}
.closeBtn{
position:absolute;
top:10px;
right:10px;
z-index:2;
border:none;
background:#ff3b30;
color:#fff;
padding:8px 12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
#lockerFrame{
width:100%;
height:100%;
border:none;
}
</style>
</head>

<body>

<!-- TikTok -->
<div id="ttOverlay">
<h2>Open in Browser</h2>
<p>Tap below to continue in Chrome / Safari</p>
<button onclick="openChrome()">Open Now</button>
</div>

<div class="container">
<h1>🎁 Unlock Your Reward</h1>
<p>Complete a quick step to claim your exclusive chest.</p>

<input type="text" placeholder="Enter your username">

<button class="button" onclick="goOffer()">Unlock Now 🎁</button>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div class="timer">Limited time offer ⏳</div>
<div class="stats">🔥 <span id="counter">97</span> users claimed rewards today</div>
<div class="small">Secure verification • No spam</div>
</div>

<!-- Locker -->
<div id="lockerModal">
<div class="lockerBox">
<button class="closeBtn" onclick="closeLocker()">✕</button>
<iframe id="lockerFrame" referrerpolicy="no-referrer"></iframe>
</div>
</div>

<script>
const lockerLink = "https://appchecker.space/cl/i/n66xj9";

/* Open locker in page */
function goOffer(){
try{
if(typeof gtag!=="undefined"){
gtag('event','click_verify_button');
}
}catch(e){}

document.getElementById("lockerModal").style.display="flex";
document.getElementById("lockerFrame").src = lockerLink;
}

function closeLocker(){
document.getElementById("lockerModal").style.display="none";
document.getElementById("lockerFrame").src="";
}

/* Progress */
let width=0;
let bar=document.getElementById("progressBar");
setInterval(()=>{
if(width<100){
width+=4;
bar.style.width=width+"%";
}
},200);

/* Fake counter */
let counterEl=document.getElementById("counter");
let counter=97;
setInterval(()=>{
counter+=Math.floor(Math.random()*2);
counterEl.innerText=counter;
},3000);

/* TikTok detect */
function isTikTok(){
return /TikTok|musical_ly/i.test(navigator.userAgent);
}

function openChrome(){
const url = window.location.href;
const intent = "intent://" + url.replace(/^https?:\/\//,'') +
"#Intent;scheme=https;package=com.android.chrome;end;";

window.location.href = intent;

setTimeout(()=>{
window.location.href = url;
},900);
}

window.addEventListener("load",()=>{
if(isTikTok()){
document.getElementById("ttOverlay").style.display="flex";
}
});
</script>

</body>
</html>
