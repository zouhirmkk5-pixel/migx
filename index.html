<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Rewards Store</title>
    <style>
        body {
            background: #2349d3; /* Dark Blue asly */
            font-family: 'Arial Black', 'Arial', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-logo {
            width: 130px;
            margin: 15px 0;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* Live Notification Bar */
        .live-feed {
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 11px;
            padding: 6px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Main Grid Container */
        .rewards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 450px;
            width: 100%;
            background: rgba(0, 0, 0, 0.15);
            padding: 12px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* Card Style */
        .card {
            background: linear-gradient(180deg, #6c3df5 0%, #4a1fbc 100%);
            border: 2px solid #8e66ff;
            border-radius: 10px;
            padding: 10px 5px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .card-title {
            color: white;
            font-size: 9px;
            font-weight: 900;
            margin-bottom: 5px;
            height: 24px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .card-img {
            width: 100%;
            max-width: 65px;
            height: 65px;
            margin: 5px auto;
            object-fit: contain;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.4));
        }

        .price-tag {
            margin: 5px 0;
        }

        .old-price {
            color: #afff00;
            font-size: 8px;
            text-decoration: line-through;
            margin-right: 3px;
        }

        .free-text {
            color: #afff00;
            font-size: 10px;
            font-weight: bold;
        }

        /* Claim Button */
        .claim-btn {
            background: linear-gradient(180deg, #00a2ff 0%, #005fcc 100%);
            border: 1px solid #00d9ff;
            border-radius: 4px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 6px 0;
            cursor: pointer;
            box-shadow: 0 3px 0 #003a80;
            transition: 0.1s;
        }

        .claim-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        /* Label khass l-popular items */
        .special-tag {
            background: #ff0000;
            color: white;
            font-size: 7px;
            padding: 2px 5px;
            position: absolute;
            top: 5px;
            right: 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="live-feed">🔥 <b>KazeULTRA</b> got Kaze Ultra Legendary Brawlers! (36m ago)</div>
