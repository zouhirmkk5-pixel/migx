<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars - Official Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bs-blue: #2b5ce6;
            --card-purple: #4a1fbc;
            --accent-green: #afff00;
            --footer-bg: #000000;
            --modal-green: #52a51d;
            --modal-border: #2d5a11;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bs-blue);
            font-family: 'Lilita One', cursive;
            color: white; text-align: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(rgba(255,255,255,0.15) 15%, transparent 15%),
                radial-gradient(rgba(255,255,255,0.15) 15%, transparent 15%);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
            animation: moveBackground 4s linear infinite;
        }

        @keyframes moveBackground {
            from { background-position: 0 0, 25px 25px; }
            to { background-position: 50px 50px, 75px 75px; }
        }

        .live-bar { background: rgba(0,0,0,0.5); padding: 8px 0; font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .logo-container { margin: 20px 0; }
        .logo { 
            width: 170px; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
            animation: floatLogo 3s ease-in-out infinite;
        }
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .stats-panel {
            background: rgba(22, 33, 85, 0.85);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px; display: inline-flex; gap: 30px; padding: 15px 35px; margin-bottom: 25px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6); align-items: center;
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 100px; position: relative; }
        .stat-box:first-child::after { content: ""; position: absolute; right: -15px; top: 20%; height: 60%; width: 2px; background: rgba(255,255,255,0.1); }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #ff4444; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #ff4444; }
        .dot.blue { background: #00ccff; box-shadow: 0 0 8px #00ccff; }
        .stat-icon { width: 45px; height: 45px; margin-bottom: 8px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .stat-val { font-size: 24px; text-shadow: 2px 2px #000; letter-spacing: 1px; }
        .stat-label { font-size: 10px; text-transform: uppercase; opacity: 0.8; margin-top: 2px; }

        .container {
            width: 95%; max-width: 480px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px; padding: 20px 15px; box-sizing: border-box;
        }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .card {
            background: var(--card-purple); border: 2px solid #a385ff; border-radius: 18px;
            padding: 15px 5px; position: relative; overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;
        }
        .card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(from 0deg, rgba(255, 255, 255, 0) 0deg 15deg, rgba(255, 255, 255, 0.08) 15deg 30deg);
            animation: rotateSun 12s linear infinite; z-index: 0;
        }
        @keyframes rotateSun { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .item-name { font-size: 9px; height: 24px; z-index: 2; text-shadow: 1px 1px #000; text-transform: uppercase; }
        .img-box { height: 75px; display: flex; align-items: center; justify-content: center; z-index: 2; margin: 5px 0; }
        .item-img { max-width: 90%; max-height: 100%; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.6)); }
        .price-line { color: var(--accent-green); font-size: 10px; margin-bottom: 8px; z-index: 2; text-shadow: 1px 1px #000; }
        .btn-claim {
            background: linear-gradient(180deg, #00a2ff 0%, #005fcc 100%);
            border: none; border-bottom: 4px solid #003a80; border-radius: 10px;
            color: white; font-size: 14px; padding: 7px 0; width: 90%; cursor: pointer; z-index: 2; font-family: 'Lilita One', cursive;
        }

        /* --- PROFESSIONAL MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(8px);
        }
        .modal-box {
            background: var(--modal-green); width: 85%; max-width: 360px;
            border: 5px solid var(--modal-border); border-radius: 30px;
            padding: 40px 25px; position: relative; box-shadow: 0 12px 0 var(--modal-border);
        }
        .btn-back {
            position: absolute; top: 15px; left: 15px;
            background: #333; border-radius: 8px; width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; box-shadow: 0 3px 0 #000;
        }
        .modal-box h2 { font-size: 26px; margin-bottom: 25px; text-shadow: 3px 3px 0 #000; color: white; }
        .input-wrapper {
            background: rgba(0,0,0,0.4); border: 3px solid rgba(255,255,255,0.2);
            border-radius: 18px; padding: 18px; margin-bottom: 20px; display: flex; align-items: center;
        }
        .modal-input {
            background: transparent; border: none; color: white; width: 100%;
            font-family: 'Lilita One', cursive; font-size: 22px; outline: none;
        }
        .btn-letsgo {
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            border: none; border-bottom: 8px solid #b36b00; border-radius: 15px;
            color: white; font-size: 30px; padding: 12px 0; width: 100%;
            cursor: pointer; font-family: 'Lilita One', cursive; text-shadow: 3px 3px 0 #b36b00;
        }
        .modal-info { font-size: 10px; margin-top: 20px; text-transform: uppercase; line-height: 1.4; opacity: 0.9; }

        footer {
            margin-top: 60px; background: var(--footer-bg); padding: 50px 20px;
            text-align: left; color: #ffffff; font-family: sans-serif;
        }
        .footer-bottom {
            max-width: 500px; margin: 0 auto; display: flex; justify-content: space-between;
            border-top: 1px solid #333; padding-top: 30px;
        }
        .legal-links { display: flex; flex-direction: column; gap: 12px; }
        .legal-links a { color: white; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="live-bar">🔥 <b>BR4WL_K1NG</b> claimed <span>Chaos Drops!</span></div>

    <div class="logo-container">
        <img src="./logo.PNG" class="logo">
    </div>

    <div class="stats-panel">
        <div class="stat-box">
            <div style="font-size: 9px;"><span class="dot"></span> LIVE</div>
            <img src="./chaous.PNG" id="liveIcon" class="stat-icon">
            <span class="stat-val" id="claimed">3,122</span>
            <span class="stat-label">Claimed</span>
        </div>
        <div class="stat-box">
            <div style="font-size: 9px;"><span class="dot blue"></span> CLAIMS TODAY</div>
            <img src="./boltbox.PNG" id="onlineIcon" class="stat-icon">
            <span class="stat-val" id="online">1,088</span>
            <span class="stat-label">Online</span>
        </div>
    </div>

    <div class="container">
        <div style="font-size:18px; margin-bottom:18px; text-shadow: 2px 2px #000;">CHOOSE YOUR REWARD</div>
        <div class="grid" id="mainGrid"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <button class="btn-back" onclick="closeModal()"><i class="fas fa-chevron-left" style="color: white;"></i></button>
            <h2>ENTER PLAYER TAG</h2>
            <div class="input-wrapper">
                <span style="font-size:24px; margin-right:10px; color:#777;">#</span>
                <input type="text" class="modal-input" id="playerTag" placeholder="PLAYER TAG" maxlength="12">
            </div>
            <button class="btn-letsgo" onclick="submitTag()">LET'S GO!</button>
            <p class="modal-info">WE USE A REAL SYSTEM TO FIND YOUR ACCOUNT. MAKE SURE YOU SEE YOUR REAL USERNAME NEXT!</p>
        </div>
    </div>

    <footer>
        <div class="footer-bottom">
            <div class="legal-links">
                <a href="#">Terms of Service</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Parent's Guide</a>
            </div>
            <div style="text-align: right;">
                <img src="./super.JPG" style="width:100px;">
                <p style="font-size:10px; color:#888;">© 2026 Supercell Oy.</p>
            </div>
        </div>
    </footer>

    <script>
        const rewards = [
            {n: "ULTRA CHAOS DROPS", q: "X6", img: "chaous.PNG"},
            {n: "2000 GEMS", q: "X24", img: "gems.PNG"},
            {n: "STARR NOVA BOX", q: "X100", img: "novabox.PNG"},
            {n: "STARR NOVA SKIN", q: "X1", img: "nova.PNG"},
            {n: "DAMIAN BOX", q: "X1", img: "damianbox.PNG"},
            {n: "DAMIAN SKIN", q: "X1", img: "damian.PNG"},
            {n: "BOLT SKIN", q: "X1", img: "bolt.PNG"},
            {n: "BOLT BOX", q: "X50", img: "boltbox.PNG"},
            {n: "MEGA BOX", q: "X10", img: "mega.PNG"},
            {n: "NAJIA BOX", q: "X10", img: "najiabox.PNG"},
            {n: "NAJIA BRAWLER", q: "X1", img: "najia.PNG"},
            {n: "SIRIUS BOX", q: "X6", img: "siriusbox.PNG"},
            {n: "KAZE", q: "X1", img: "kaze.PNG"},
            {n: "BRAWL PASS PLUS", q: "X1", img: "pass.PNG"},
            {n: "SIRIUS BRAWLER", q: "X1", img: "sirius.PNG"},
            {n: "ULTRA BOX", q: "X6", img: "ultrabox.PNG"},
            {n: "BUFFIES", q: "X6", img: "buffies.PNG"},
            {n: "KEYS", q: "X6", img: "Keys.PNG"}
        ];

        const grid = document.getElementById('mainGrid');
        rewards.forEach(r => {
            grid.innerHTML += `
                <div class="card">
                    <div class="item-name">${r.n}</div>
                    <div class="img-box"><img src="./${r.img}" class="item-img"></div>
                    <div class="price-line">${r.q} FREE</div>
                    <button class="btn-claim" onclick="openModal()">CLAIM</button>
                </div>`;
        });

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function submitTag() { /* Hna zid link dyal CPA dyalk */ }

        const iconPool = ["chaous.PNG", "boltbox.PNG", "mega.PNG", "novabox.PNG", "damianbox.PNG", "siriusbox.PNG", "ultrabox.PNG"];
        setInterval(() => {
            const cl = document.getElementById('claimed');
            const on = document.getElementById('online');
            const liveImg = document.getElementById('liveIcon');
            const onlineImg = document.getElementById('onlineIcon');
            cl.innerText = (parseInt(cl.innerText.replace(',','')) + Math.floor(Math.random()*4+1)).toLocaleString();
            on.innerText = (parseInt(on.innerText.replace(',','')) + Math.floor(Math.random()*5-2)).toLocaleString();
            liveImg.src = `./${iconPool[Math.floor(Math.random()*iconPool.length)]}`;
            onlineImg.src = `./${iconPool[Math.floor(Math.random()*iconPool.length)]}`;
            [liveImg, onlineImg].forEach(img => {
                img.style.transform = "scale(1.2)";
                setTimeout(() => img.style.transform = "scale(1)", 250);
            });
        }, 3000);
    </script>
</body>
</html>
