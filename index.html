<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Rewards</title>
    <style>
        body {
            background-color: #2b57e6; /* Blue background */
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-logo {
            width: 150px;
            margin: 20px 0;
        }

        /* Live Feed */
        .live-banner {
            background: rgba(0,0,0,0.5);
            width: 100%;
            text-align: center;
            color: white;
            font-size: 12px;
            padding: 5px 0;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        /* Container dyal l-items */
        .rewards-container {
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 Columns */
            gap: 10px;
            max-width: 500px;
        }

        /* Card dyal Reward */
        .reward-card {
            background: linear-gradient(180deg, #7c4dff 0%, #512da8 100%);
            border: 2px solid #9c7aff;
            border-radius: 12px;
            padding: 10px 5px;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-name {
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
            height: 25px;
        }

        .item-img {
            width: 100%;
            height: auto;
            max-width: 70px;
            margin: 5px auto;
            /* Hna t-zid "filter: drop-shadow" bach t-ban high quality */
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.3));
        }

        .item-price {
            color: #afff00; /* Neon Green text */
            font-size: 9px;
            margin: 5px 0;
            text-decoration: line-through;
            display: block;
        }

        .free-label {
            color: #afff00;
            font-size: 10px;
            font-weight: bold;
        }

        .claim-btn {
            background: linear-gradient(180deg, #0091ff 0%, #0056b3 100%);
            border: 1px solid #00d2ff;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            padding: 8px 0;
            margin-top: 8px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            box-shadow: 0 3px 0 #003d80;
        }

        .claim-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

    </style>
</head>
<body>

    <div class="live-banner">🔥 <b>KazeULTRA</b> got Kaze Ultra Legendary Brawlers! (36m ago)</div>
    
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/7/7a/Brawl_Stars_logo.svg/1200px-Brawl_Stars_logo.svg.png" class="header-logo" alt="Brawl Stars">

    <div class="rewards-container">
        
        <div class="reward-card">
            <div class="item-name">ULTRA CHAOS DROPS</div>
            <img src="https://i.ibb.co/vzVf6n4/chaos-drop.png" class="item-img" alt="Chaos Drop">
            <div>
                <span class="item-price">$2.99</span>
                <span class="free-label">X6 FREE</span>
            </div>
            <button class="claim-btn">CLAIM</button>
        </div>

        <div class="reward-card">
            <div class="item-name">2000 GEMS</div>
            <img src="https://i.ibb.co/V2fXQzD/gems.png" class="item-img" alt="Gems">
            <div>
                <span class="item-price">$19.99</span>
                <span class="free-label">X24 FREE</span>
            </div>
            <button class="claim-btn">CLAIM</button>
        </div>

        <div class="reward-card">
            <div class="item-name">STARR NOVA BOX</div>
            <img src="https://i.ibb.co/8YhG0vX/starr-box.png" class="item-img" alt="Starr Box">
            <div>
                <span class="item-price">$24.99</span>
                <span class="free-label">X100 FREE</span>
            </div>
            <button class="claim-btn">CLAIM</button>
        </div>

        </div>

</body>
</html>
