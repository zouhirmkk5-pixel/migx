<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars - Official Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bs-blue: #2b5ce6;
            --card-purple: #4a1fbc;
            --accent-green: #afff00;
            --modal-green: #4e8d21;
            --modal-border: #2a5212;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bs-blue);
            font-family: 'Lilita One', cursive;
            color: white; text-align: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(rgba(255,255,255,0.15) 15%, transparent 15%),
                radial-gradient(rgba(255,255,255,0.15) 15%, transparent 15%);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
            animation: moveBackground 4s linear infinite;
        }

        @keyframes moveBackground {
            from { background-position: 0 0, 25px 25px; }
            to { background-position: 50px 50px, 75px 75px; }
        }

        /* Stats & Logo */
        .logo-container { margin: 20px 0; }
        .logo { width: 170px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6)); animation: floatLogo 3s ease-in-out infinite; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .stats-panel {
            background: rgba(22, 33, 85, 0.85); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px; display: inline-flex; gap: 30px; padding: 15px 35px; margin-bottom: 25px;
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 100px; }
        .stat-icon { width: 45px; height: 45px; transition: transform 0.3s; }
        .stat-val { font-size: 24px; text-shadow: 2px 2px #000; }

        /* Grid */
        .container { width: 95%; max-width: 480px; margin: 0 auto; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .card {
            background: var(--card-purple); border: 2px solid #a385ff; border-radius: 18px;
            padding: 15px 5px; position: relative; overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;
        }
        .item-name { font-size: 9px; z-index: 2; text-shadow: 1px 1px #000; text-transform: uppercase; }
        .img-box { height: 75px; display: flex; align-items: center; z-index: 2; }
        .item-img { max-width: 90%; max-height: 100%; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.6)); }
        .btn-claim {
            background: linear-gradient(180deg, #00a2ff 0%, #005fcc 100%);
            border: none; border-bottom: 4px solid #003a80; border-radius: 10px;
            color: white; font-size: 14px; padding: 7px 0; width: 90%; cursor: pointer; z-index: 2; font-family: 'Lilita One', cursive;
        }

        /* --- MODAL (POPUP) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-box {
            background: var(--modal-green); width: 90%; max-width: 350px;
            border: 4px solid var(--modal-border); border-radius: 25px;
            padding: 30px 20px; position: relative; box-shadow: 0 10px 0 var(--modal-border);
        }
        .modal-box h2 { font-size: 24px; margin-bottom: 20px; text-shadow: 3px 3px 0 #000; }
        .input-wrapper {
            background: rgba(0,0,0,0.3); border: 3px solid rgba(255,255,255,0.2);
            border-radius: 15px; padding: 15px; margin-bottom: 20px; display: flex; align-items: center;
        }
        .input-wrapper span { font-size: 22px; margin-right: 10px; color: #aaa; }
        .modal-input {
            background: transparent; border: none; color: white; width: 100%;
            font-family: 'Lilita One', cursive; font-size: 20px; outline: none;
        }
        .modal-input::placeholder { color: rgba(255,255,255,0.3); }
        
        .btn-letsgo {
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            border: none; border-bottom: 6px solid #b36b00; border-radius: 15px;
            color: white; font-size: 26px; padding: 10px 0; width: 100%;
            cursor: pointer; font-family: 'Lilita One', cursive; text-shadow: 2px 2px 0 #b36b00;
        }
        .modal-info { font-size: 9px; margin-top: 15px; opacity: 0.8; line-height: 1.3; }

        /* Footer */
        footer { margin-top: 60px; background: #000; padding: 50px 20px; text-align: left; color: #fff; }
        .supercell-logo { width: 100px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="./logo.PNG" class="logo">
    </div>

    <div class="stats-panel">
        <div class="stat-box">
            <img src="./chaous.PNG" id="liveIcon" class="stat-icon">
            <span class="stat-val" id="claimed">3,122</span>
            <span class="stat-label">Claimed</span>
        </div>
        <div class="stat-box">
            <img src="./boltbox.PNG" id="onlineIcon" class="stat-icon">
            <span class="stat-val" id="online">1,088</span>
            <span class="stat-label">Online</span>
        </div>
    </div>

    <div class="container">
        <div class="grid" id="mainGrid"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <h2>ENTER PLAYER TAG</h2>
            <div class="input-wrapper">
                <span>#</span>
                <input type="text" class="modal-input" id="playerTag" placeholder="PLAYER TAG" maxlength="12">
                <i class="fas fa-info-circle" style="color: #4a90e2;"></i>
            </div>
            <button class="btn-letsgo" onclick="submitTag()">LET'S GO!</button>
            <p class="modal-info">WE USE A REAL SYSTEM TO FIND YOUR ACCOUNT. MAKE SURE YOU SEE YOUR REAL USERNAME NEXT!</p>
        </div>
    </div>

    <footer>
        <div style="display:flex; justify-content:space-between; max-width:480px; margin:0 auto;">
            <div style="font-size:12px;">
                <p>Terms of Service</p>
                <p>Privacy Policy</p>
                <img src="./super.JPG" class="supercell-logo">
            </div>
            <div style="text-align:right; font-size:10px; color:#888;">
                <p>Supercell Oy<br>Helsinki, Finland</p>
            </div>
        </div>
    </footer>

    <script>
        // Reward data kima f image dyal GitHub
        const rewards = [
            {n: "ULTRA CHAOS DROPS", q: "X6", img: "chaous.PNG"},
            {n: "2000 GEMS", q: "X24", img: "gems.PNG"},
            {n: "STARR NOVA BOX", q: "X100", img: "novabox.PNG"},
            {n: "STARR NOVA SKIN", q: "X1", img: "nova.PNG"},
            {n: "DAMIAN BOX", q: "X1", img: "damianbox.PNG"},
            {n: "DAMIAN SKIN", q: "X1", img: "damian.PNG"},
            {n: "BOLT SKIN", q: "X1", img: "bolt.PNG"},
            {n: "BOLT BOX", q: "X50", img: "boltbox.PNG"},
            {n: "MEGA BOX", q: "X10", img: "mega.PNG"},
            {n: "NAJIA BOX", q: "X10", img: "najiabox.PNG"},
            {n: "NAJIA BRAWLER", q: "X1", img: "najia.PNG"},
            {n: "SIRIUS BOX", q: "X6", img: "siriusbox.PNG"},
            {n: "KAZE", q: "X1", img: "kaze.PNG"},
            {n: "BRAWL PASS PLUS", q: "X1", img: "pass.PNG"},
            {n: "SIRIUS BRAWLER", q: "X1", img: "sirius.PNG"},
            {n: "ULTRA BOX", q: "X6", img: "ultrabox.PNG"},
            {n: "BUFFIES", q: "X6", img: "buffies.PNG"},
            {n: "KEYS", q: "X6", img: "Keys.PNG"}
        ];

        const grid = document.getElementById('mainGrid');
        const modal = document.getElementById('modal');

        rewards.forEach(r => {
            grid.innerHTML += `
                <div class="card">
                    <div class="item-name">${r.n}</div>
                    <div class="img-box"><img src="./${r.img}" class="item-img"></div>
                    <div style="color:var(--accent-green); font-size:10px;">${r.q} FREE</div>
                    <button class="btn-claim" onclick="openModal()">CLAIM</button>
                </div>`;
        });

        function openModal() { modal.style.display = 'flex'; }
        
        function submitTag() {
            const tag = document.getElementById('playerTag').value;
            if(tag.length > 3) {
                alert("Loading Player: #" + tag.toUpperCase());
                // Hna tqdar t-zid redirection l-cpabuild dylk
            } else {
                alert("Please enter a valid Tag");
            }
        }

        // Animation logic
        const iconPool = ["chaous.PNG", "boltbox.PNG", "mega.PNG", "novabox.PNG"];
        setInterval(() => {
            document.getElementById('liveIcon').src = `./${iconPool[Math.floor(Math.random()*iconPool.length)]}`;
            document.getElementById('onlineIcon').src = `./${iconPool[Math.floor(Math.random()*iconPool.length)]}`;
        }, 3000);
    </script>
</body>
</html>
