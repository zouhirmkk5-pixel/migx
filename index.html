<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawler Rewards - Transparent Pro</title>
    <style>
        :root {
            --bs-blue: #2b5ce6;
            --card-purple: #4a1fbc;
            --accent-green: #afff00;
        }

        body {
            background-color: var(--bs-blue);
            background-image: radial-gradient(rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Arial Black', sans-serif;
            margin: 0; color: white; text-align: center;
        }

        .header-section {
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, transparent 100%);
            padding: 20px 0;
        }

        .logo { width: 160px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }

        .stats-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            display: inline-flex;
            padding: 10px 25px;
            gap: 40px;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-item span { display: block; font-size: 20px; font-weight: 900; color: #fff; }
        .stat-item label { font-size: 10px; color: #aaa; text-transform: uppercase; }

        .container {
            width: 95%; max-width: 500px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 20px 10px;
        }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

        .card {
            background: #4e21cc;
            background-image: linear-gradient(135deg, #5e2de3 0%, #4a1fbc 100%);
            border: 2px solid #7a46ff; border-radius: 18px;
            padding: 10px 5px; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .item-name { font-size: 9px; font-weight: 900; height: 25px; line-height: 1.1; margin-bottom: 5px; }

        /* L-FAZA DYAL TRANSPARENCY HIA HADI */
        .img-box {
            height: 85px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 8px; position: relative;
        }
        .item-img { 
            width: 95%; max-height: 100%; object-fit: contain;
            /* Kat-7iyd ay khalfya ila kounti m-qad s-swar PNG */
            mix-blend-mode: multiply; 
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.4));
        }

        .price-tag { color: var(--accent-green); font-size: 10px; font-weight: 900; margin-bottom: 8px; }
        .old-p { text-decoration: line-through; opacity: 0.6; font-size: 8px; }

        .btn-claim {
            background: linear-gradient(180deg, #00afff 0%, #0066ff 100%);
            border: none; border-bottom: 3px solid #0044aa;
            border-radius: 8px; color: white; font-size: 12px; font-weight: 900;
            padding: 8px 0; width: 90%; cursor: pointer;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        footer { margin-top: 40px; padding: 20px; font-size: 10px; color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="https://vignette.wikia.nocookie.net/brawlstars/images/2/21/Brawl_Stars_Logo.png" class="logo">
    </div>

    <div class="stats-container">
        <div class="stat-item"><span>3,105</span><label>Claims</label></div>
        <div class="stat-item"><span>1,095</span><label>Online</label></div>
    </div>

    <div class="container">
        <h3 style="margin-top:0; font-size:16px;">CHOOSE YOUR REWARD</h3>
        <div class="grid" id="rewardsGrid"></div>
    </div>

    <footer>© Supercell | Privacy Policy</footer>

    <script>
        const baseUrl = "./"; // K-i-khdem local m3a index.html
        const rewards = [
            {n: "ULTRA CHAOS DROPS", p: "$2.99", q: "X6", img: "chaos.JPG"},
            {n: "2000 GEMS", p: "$19.99", q: "X24", img: "gems.JPG"},
            {n: "STARR NOVA BOX", p: "$24.99", q: "X100", img: "nova_box.jpg"},
            {n: "STARR NOVA SKIN", p: "$14.99", q: "X1", img: "nova_skin.jpg"},
            {n: "DAMIAN BOX", p: "$9.99", q: "X1", img: "damian_box.jpg"},
            {n: "DAMIAN SKIN", p: "$4.99", q: "X1", img: "damian_skin.JPG"},
            {n: "BOLT SKIN", p: "$4.99", q: "X1", img: "bolt_skin.JPG"},
            {n: "BOLT BOX", p: "$9.99", q: "X50", img: "bolt_box.jpg"},
            {n: "MEGA BOX", p: "$4.99", q: "X10", img: "mega_box.jpg"},
            {n: "NAJIA BOX", p: "$2.99", q: "X10", img: "najia_box.jpg"},
            {n: "NAJIA BRAWLER", p: "$8.99", q: "X1", img: "najia_skin.JPG"},
            {n: "SIRIUS BOX", p: "$2.99", q: "X6", img: "sirius_box.jpg"},
            {n: "KAZE", p: "$8.99", q: "X1", img: "kaze.png.JPG"},
            {n: "BRAWL PASS", p: "$8.99", q: "X1", img: "pass.jpg"},
            {n: "SIRIUS BRAWLER", p: "$4.99", q: "X1", img: "sirius.JPG"}
        ];

        const grid = document.getElementById('rewardsGrid');
        rewards.forEach(r => {
            grid.innerHTML += `
                <div class="card">
                    <div class="item-name">${r.n}</div>
                    <div class="img-box">
                        <img src="${baseUrl}${r.img}" class="item-img" alt="${r.n}">
                    </div>
                    <div class="price-tag"><span class="old-p">${r.p}</span> ${r.q} FREE</div>
                    <button class="btn-claim">CLAIM</button>
                </div>
            `;
        });
    </script>
</body>
</html>
