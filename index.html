<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars - Official Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bs-blue: #2b5ce6;
            --card-purple: #4a1fbc;
            --accent-green: #afff00;
        }

        body {
            background-color: var(--bs-blue);
            background-image: radial-gradient(rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Lilita One', cursive; /* Khet official */
            margin: 0; color: white; text-align: center;
        }

        /* --- TOP BAR (CLAIMS TODAY) --- */
        .live-bar { background: rgba(0,0,0,0.5); padding: 5px 0; font-size: 11px; }
        
        .stats-panel {
            background: rgba(22, 33, 85, 0.7);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            display: inline-flex;
            gap: 15px;
            padding: 8px 15px;
            margin: 20px 0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 80px; }
        .stat-icon { width: 35px; height: 35px; margin-bottom: 5px; }
        .stat-val { font-size: 18px; color: #fff; text-shadow: 2px 2px #000; }
        .stat-label { font-size: 8px; text-transform: uppercase; color: #aaa; }

        .logo { width: 150px; margin: 10px 0; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }

        .container {
            width: 95%; max-width: 500px; margin: 0 auto;
            background: rgba(43, 92, 230, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 15px; box-sizing: border-box;
        }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

        /* --- CARD DESIGN --- */
        .card {
            background: #4e21cc;
            border: 2.5px solid #7a46ff;
            border-radius: 12px;
            padding: 10px 5px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 0 #2a1270;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Rotation Effect */
        .card::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(
                from 0deg,
                rgba(255, 255, 255, 0) 0deg 15deg,
                rgba(255, 255, 255, 0.06) 15deg 30deg
            );
            animation: rotateSun 12s linear infinite;
            z-index: 0;
        }

        @keyframes rotateSun { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .item-name { font-size: 10px; height: 24px; text-transform: uppercase; z-index: 2; text-shadow: 1px 1px #000; }
        
        .img-box { height: 80px; width: 100%; display: flex; align-items: center; justify-content: center; z-index: 2; }
        .item-img { max-width: 90%; max-height: 90%; object-fit: contain; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.4)); }
        
        .price-line { color: var(--accent-green); font-size: 10px; margin: 5px 0; z-index: 2; text-shadow: 1px 1px #000; }
        .old { text-decoration: line-through; opacity: 0.7; font-size: 8px; }

        /* --- BUTTON CLAIM --- */
        .btn-claim {
            background: linear-gradient(180deg, #00afff 0%, #0066ff 100%);
            border: none;
            border-bottom: 4px solid #0044aa;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            padding: 6px 0;
            width: 90%;
            cursor: pointer;
            z-index: 2;
            font-family: 'Lilita One', cursive;
            transition: 0.1s;
        }

        .btn-claim:active { transform: translateY(2px); border-bottom: 2px solid #0044aa; }

        footer { background: #000; padding: 30px; margin-top: 40px; }
        .sc-logo { width: 100px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="live-bar">🔥 <b>Kaze_Ultra</b> just claimed <span>MEGA BOX!</span></div>

    <img src="https://vignette.wikia.nocookie.net/brawlstars/images/2/21/Brawl_Stars_Logo.png" class="logo">

    <div class="stats-panel">
        <div class="stat-box">
            <img src="https://files.catbox.moe/8hpswz.png" class="stat-icon"> <span class="stat-val">3,122</span>
            <span class="stat-label">Claimed</span>
        </div>
        <div class="stat-box">
            <img src="https://files.catbox.moe/v087j1.png" class="stat-icon"> <span class="stat-val">1,088</span>
            <span class="stat-label">Online</span>
        </div>
    </div>

    <div class="container">
        <div style="font-size:18px; margin-bottom:15px; text-shadow: 2px 2px #000;">CHOOSE YOUR REWARD</div>
        <div class="grid" id="mainGrid"></div>
    </div>

    <footer>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Supercell_logo.svg/1200px-Supercell_logo.svg.png" class="sc-logo">
    </footer>

    <script>
        const rewards = [
            {n: "ULTRA CHAOS DROPS", p: "$2.99", q: "X6", img: "chaous.PNG"},
            {n: "2000 GEMS", p: "$19.99", q: "X24", img: "gems.PNG"},
            {n: "STARR NOVA BOX", p: "$24.99", q: "X100", img: "novabox.PNG"},
            {n: "STARR NOVA SKIN", p: "$14.99", q: "X1", img: "nova.PNG"},
            {n: "DAMIAN BOX", p: "$9.99", q: "X1", img: "damianbox.PNG"},
            {n: "DAMIAN SKIN", p: "$4.99", q: "X1", img: "damian.PNG"},
            {n: "BOLT SKIN", p: "$4.99", q: "X1", img: "bolt.PNG"},
            {n: "BOLT BOX", p: "$9.99", q: "X50", img: "boltbox.PNG"},
            {n: "MEGA BOX", p: "$4.99", q: "X10", img: "mega.PNG"},
            {n: "NAJIA BOX", p: "$2.99", q: "X10", img: "najiabox.PNG"},
            {n: "NAJIA BRAWLER", p: "$8.99", q: "X1", img: "najia.PNG"},
            {n: "SIRIUS BOX", p: "$2.99", q: "X6", img: "siriusbox.PNG"},
            {n: "KAZE", p: "$8.99", q: "X1", img: "kaze.PNG"},
            {n: "BRAWL PASS PLUS", p: "$8.99", q: "X1", img: "pass.PNG"},
            {n: "SIRIUS BRAWLER", p: "$4.99", q: "X1", img: "sirius.PNG"},
            {n: "ULTRA BOX", p: "$9.99", q: "X6", img: "ultrabox.PNG"},
            {n: "BUFFIES", p: "$2.99", q: "X6", img: "buffies.PNG"},
            {n: "KEYS", p: "$2.99", q: "X6", img: "Keys.PNG"}
        ];

        const grid = document.getElementById('mainGrid');
        rewards.forEach(r => {
            grid.innerHTML += `
                <div class="card">
                    <div class="item-name">${r.n}</div>
                    <div class="img-box">
                        <img src="./${r.img}" class="item-img" onerror="this.src='https://files.catbox.moe/p9p4j6.png'">
                    </div>
                    <div class="price-line"><span class="old">${r.p}</span> ${r.q} FREE</div>
                    <button class="btn-claim">CLAIM</button>
                </div>
            `;
        });

        // Animation sghira dyal stats dyal online
        setInterval(() => {
            let online = document.querySelectorAll('.stat-val')[1];
            let current = parseInt(online.innerText.replace(',',''));
            online.innerText = (current + Math.floor(Math.random() * 5 - 2)).toLocaleString();
        }, 3000);
    </script>
</body>
</html>
