<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>99Nights Rewards</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .hero-section {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(180deg, rgba(139, 92, 246, 0.2) 0%, rgba(15, 23, 42, 0) 100%);
            width: 100%;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .rewards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            width: 90%;
            padding: 20px;
        }

        .reward-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .reward-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
        }

        .gem-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .amount {
            font-size: 1.8rem;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .reward-button {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }

        .reward-button:hover {
            opacity: 0.9;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .badge {
            position: absolute;
            top: 10px;
            right: -30px;
            background: #ef4444;
            padding: 5px 40px;
            transform: rotate(45deg);
            font-size: 0.7rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1 class="title">99NIGHTS EXCLUSIVE REWARDS</h1>
        <p>Select your pack and claim your gems instantly!</p>
    </div>

    <div class="rewards-grid">
        <div class="reward-card">
            <span class="gem-icon">💎</span>
            <span class="amount">1,000 GEMS</span>
            <p>Starter Pack</p>
            <button class="reward-button">Claim Now</button>
        </div>

        <div class="reward-card">
            <div class="badge">POPULAR</div>
            <span class="gem-icon">💎💎</span>
            <span class="amount">5,000 GEMS</span>
            <p>Pro Gamer Pack</p>
            <button class="reward-button">Claim Now</button>
        </div>

        <div class="reward-card">
            <span class="gem-icon">💎💎💎</span>
            <span class="amount">10,000 GEMS</span>
            <p>Ultimate Pack</p>
            <button class="reward-button">Claim Now</button>
        </div>

        <div class="reward-card">
            <span class="gem-icon">👑</span>
            <span class="amount">50,000 GEMS</span>
            <p>Legendary Pack</p>
            <button class="reward-button">Claim Now</button>
        </div>
    </div>

</body>
</html>
