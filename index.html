<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawler Rewards - Transparent</title>
    <style>
        :root {
            --bs-blue: #2b5ce6;
            --card-purple: #4a1fbc;
            --accent-green: #afff00;
        }

        body {
            background-color: var(--bs-blue);
            background-image: radial-gradient(rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Arial Black', sans-serif;
            margin: 0; color: white; text-align: center;
        }

        .header-section { padding: 20px 0; }
        .logo { width: 140px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }

        .container {
            width: 95%; max-width: 500px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 20px 10px;
        }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

        .card {
            background: #4e21cc;
            background-image: radial-gradient(circle at top, #6a36ff 0%, #4a1fbc 100%);
            border: 2px solid #7a46ff; border-radius: 18px;
            padding: 10px 5px; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .item-name { font-size: 9px; font-weight: 900; height: 25px; line-height: 1.1; margin-bottom: 5px; }

        .img-box {
            height: 90px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 8px;
        }

        /* HADA HWA L-MOUCHKI L-KABIR: TRANS-PARENT BACKGROUND */
        .item-img { 
            width: 110%; /* Zdna l-7ajm chwiya */
            max-height: 110%; 
            object-fit: contain;
            /* Hada k-i-7yed l-khalfya l-ghameqa u k-i-khalli ghir l-reward */
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.1);
        }

        .price-tag { color: var(--accent-green); font-size: 10px; font-weight: 900; margin-bottom: 8px; }
        .old-p { text-decoration: line-through; opacity: 0.6; font-size: 8px; }

        .btn-claim {
            background: linear-gradient(180deg, #00afff 0%, #0066ff 100%);
            border: none; border-bottom: 3px solid #0044aa;
            border-radius: 8px; color: white; font-size: 12px; font-weight: 900;
            padding: 8px 0; width: 90%; cursor: pointer;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="https://vignette.wikia.nocookie.net/brawlstars/images/2/21/Brawl_Stars_Logo.png" class="logo">
    </div>

    <div class="container">
        <h3 style="margin: 0 0 15px 0; font-size:16px;">SELECT YOUR REWARD</h3>
        <div class="grid" id="rewardsGrid"></div>
    </div>

    <script>
        // Smiyat dyal s-swar kima f l-image dyal GitHub dyalk
        const items = [
            {n: "ULTRA CHAOS DROPS", p: "$2.99", q: "X6", img: "chaos.JPG"},
            {n: "2000 GEMS", p: "$19.99", q: "X24", img: "gems.JPG"},
            {n: "STARR NOVA BOX", p: "$24.99", q: "X100", img: "nova_box.jpg"},
            {n: "STARR NOVA SKIN", p: "$14.99", q: "X1", img: "nova_skin.jpg"},
            {n: "DAMIAN BOX", p: "$9.99", q: "X1", img: "damian_box.jpg"},
            {n: "DAMIAN SKIN", p: "$4.99", q: "X1", img: "damian_skin.JPG"},
            {n: "BOLT SKIN", p: "$4.99", q: "X1", img: "bolt_skin.JPG"},
            {n: "BOLT BOX", p: "$9.99", q: "X50", img: "bolt_box.jpg"},
            {n: "MEGA BOX", p: "$4.99", q: "X10", img: "mega_box.jpg"},
            {n: "NAJIA BOX", p: "$2.99", q: "X10", img: "najia_box.jpg"},
            {n: "NAJIA BRAWLER", p: "$8.99", q: "X1", img: "najia_skin.JPG"},
            {n: "SIRIUS BOX", p: "$2.99", q: "X6", img: "sirius_box.jpg"},
            {n: "KAZE", p: "$8.99", q: "X1", img: "kaze.JPG"},
            {n: "BRAWL PASS", p: "$8.99", q: "X1", img: "pass.jpg"},
            {n: "SIRIUS BRAWLER", p: "$4.99", q: "X1", img: "sirius.JPG"}
        ];

        const grid = document.getElementById('rewardsGrid');
        items.forEach(it => {
            grid.innerHTML += `
                <div class="card">
                    <div class="item-name">${it.n}</div>
                    <div class="img-box">
                        <img src="./${it.img}" class="item-img" alt="${it.n}">
                    </div>
                    <div class="price-tag"><span class="old-p">${it.p}</span> ${it.q} FREE</div>
                    <button class="btn-claim">CLAIM</button>
                </div>
            `;
        });
    </script>
</body>
</html>
