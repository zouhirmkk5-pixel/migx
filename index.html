<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawler Rewards - Official Style</title>
    <style>
        :root {
            --bs-blue: #2b5ce6;
            --card-purple: #4a1fbc;
            --accent-green: #afff00;
        }

        body {
            background-color: var(--bs-blue);
            background-image: radial-gradient(rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Arial Black', sans-serif;
            margin: 0; color: white; text-align: center;
        }

        .header-logo { width: 140px; margin: 20px 0; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }

        .container {
            width: 95%; max-width: 480px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 15px 10px;
        }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .card {
            background: #4e21cc;
            background-image: radial-gradient(circle at top, #6e3aff 0%, #4a1fbc 100%);
            border: 2px solid #7a46ff; border-radius: 18px;
            padding: 12px 5px; position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; align-items: center;
        }

        .item-name { font-size: 8px; font-weight: 900; height: 22px; line-height: 1.1; margin-bottom: 5px; }

        .img-box {
            height: 95px; width: 100%;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
        }

        .item-img { 
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); 
        }

        .price-line { color: var(--accent-green); font-size: 9px; font-weight: 900; margin-top: 5px; }
        .old { text-decoration: line-through; opacity: 0.6; font-size: 7px; margin-right: 3px; }

        .btn-claim {
            background: linear-gradient(180deg, #00afff 0%, #0066ff 100%);
            border: none; border-bottom: 4px solid #0044aa;
            border-radius: 10px; color: white; font-size: 11px; font-weight: 900;
            padding: 8px 0; width: 92%; cursor: pointer; margin-top: 8px;
        }
    </style>
</head>
<body>

    <img src="https://vignette.wikia.nocookie.net/brawlstars/images/2/21/Brawl_Stars_Logo.png" class="header-logo">

    <div class="container">
        <h3 style="margin: 0 0 15px 0; font-size:14px;">SELECT YOUR REWARD</h3>
        <div class="grid" id="mainGrid"></div>
    </div>

    <script>
        // Smiyat dyal s-swar 7seb GitHub dyalk jdid
        const rewards = [
            {n: "ULTRA CHAOS DROPS", p: "$2.99", q: "X6", img: "chaous.PNG"},
            {n: "2000 GEMS", p: "$19.99", q: "X24", img: "gems.PNG"},
            {n: "STARR NOVA BOX", p: "$24.99", q: "X100", img: "novabox.PNG"},
            {n: "STARR NOVA SKIN", p: "$14.99", q: "X1", img: "nova.PNG"},
            {n: "DAMIAN BOX", p: "$9.99", q: "X1", img: "damianbox.PNG"},
            {n: "DAMIAN SKIN", p: "$4.99", q: "X1", img: "damian.PNG"},
            {n: "BOLT SKIN", p: "$4.99", q: "X1", img: "bolt.PNG"},
            {n: "BOLT BOX", p: "$9.99", q: "X50", img: "boltbox.PNG"},
            {n: "MEGA BOX", p: "$4.99", q: "X10", img: "mega.PNG"},
            {n: "NAJIA BOX", p: "$2.99", q: "X10", img: "najiabox.PNG"},
            {n: "NAJIA BRAWLER", p: "$8.99", q: "X1", img: "najia.PNG"},
            {n: "SIRIUS BOX", p: "$2.99", q: "X6", img: "siriusbox.PNG"},
            {n: "KAZE", p: "$8.99", q: "X1", img: "kaze.PNG"},
            {n: "BRAWL PASS PLUS", p: "$8.99", q: "X1", img: "pass.PNG"},
            {n: "SIRIUS BRAWLER", p: "$4.99", q: "X1", img: "sirius.PNG"}
        ];

        const grid = document.getElementById('mainGrid');
        rewards.forEach(r => {
            grid.innerHTML += `
                <div class="card">
                    <div class="item-name">${r.n}</div>
                    <div class="img-box">
                        <img src="./${r.img}" class="item-img" alt="${r.n}">
                    </div>
                    <div class="price-line"><span class="old">${r.p}</span> ${r.q} FREE</div>
                    <button class="btn-claim">CLAIM</button>
                </div>
            `;
        });
    </script>
</body>
</html>
