<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Store Official</title>
    <style>
        body {
            background-color: #2b5ce6;
            background-image: url('https://i.ibb.co/VvzVf6n/bg-pattern.png');
            font-family: 'Arial Black', 'Arial', sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            color: white; -webkit-tap-highlight-color: transparent;
        }

        /* Top Bar */
        .top-notif {
            width: 100%; background: rgba(0,0,0,0.4); text-align: center;
            font-size: 10px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Logo & Stats */
        .header { text-align: center; padding: 25px 0; }
        .logo { width: 140px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }

        .stats-panel {
            background: rgba(0, 0, 0, 0.25); border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px; display: flex; gap: 35px; padding: 12px 30px;
            margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .stat-box { text-align: center; font-size: 9px; letter-spacing: 0.5px; opacity: 0.9; }
        .stat-val { display: block; font-size: 17px; font-weight: 900; color: #fff; }

        /* Main Container */
        .main-container {
            width: 92%; max-width: 460px; background: rgba(255, 255, 255, 0.07);
            border: 3px solid rgba(255, 255, 255, 0.18); border-radius: 28px;
            padding: 15px; margin-top: 15px;
        }

        .section-title {
            text-align: center; font-size: 15px; font-weight: 900;
            margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Rewards Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

        /* Item Card - Official Look */
        .card {
            background: #6c3df5; 
            background: radial-gradient(circle, #8e66ff 0%, #4a1fbc 100%); /* Sunburst effect */
            border: 2px solid #a385ff; border-radius: 15px;
            padding: 12px 5px; text-align: center; position: relative;
            box-shadow: 0 5px 0 rgba(0,0,0,0.25);
        }

        .item-name { 
            font-size: 9px; font-weight: 900; height: 25px; 
            text-transform: uppercase; line-height: 1.1; margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .item-img { 
            width: 100%; height: 65px; object-fit: contain;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4));
            margin-bottom: 8px;
        }

        .price-tag { color: #afff00; font-size: 9px; font-weight: 900; margin-bottom: 10px; }
        .old-p { text-decoration: line-through; opacity: 0.7; font-size: 8px; }

        /* Claim Button - Exact Match */
        .btn-claim {
            background: linear-gradient(180deg, #00a2ff 0%, #005fcc 100%);
            border: 1px solid #00d9ff; border-radius: 5px;
            color: white; font-size: 11px; font-weight: 900;
            padding: 8px 0; width: 100%; cursor: pointer;
            box-shadow: 0 3px 0 #003a80; text-transform: uppercase;
        }
        .btn-claim:active { transform: translateY(2px); box-shadow: none; }

        /* Footer Section */
        .footer {
            background: #000; width: 100%; padding: 40px 25px; margin-top: 60px;
            font-size: 11px; color: #777; box-sizing: border-box;
        }
        .footer p { margin: 8px 0; cursor: pointer; }
        .footer p:hover { color: #fff; }
        .footer-logo { width: 100px; filter: grayscale(1) opacity(0.5); float: right; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-notif">🔥 <b>KazeULTRA</b> claimed <b>ULTRA BOX</b>! (12m ago)</div>

    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/7/7a/Brawl_Stars_logo.svg/1200px-Brawl_Stars_logo.svg.png" class="logo">
        <div class="stats-panel">
            <div class="stat-box">CLAIMS TODAY<span class="stat-val">3,122</span></div>
            <div class="stat-box">ONLINE<span class="stat-val">1,088</span></div>
        </div>
    </div>

    <div class="main-container">
        <div class="section-title">CHOOSE YOUR REWARD</div>
        <div class="grid">
            <div class="card">
                <div class="item-name">ULTRA CHAOS<br>DROPS</div>
                <img src="https://i.ibb.co/vzVf6n4/chaos-drop.png" class="item-img">
                <div class="price-tag"><span class="old-p">$2.99</span> X6 FREE</div>
                <button class="btn-claim">CLAIM</button>
            </div>
            <div class="card">
                <div class="item-name">2000 GEMS</div>
                <img src="https://i.ibb.co/V2fXQzD/gems.png" class="item-img">
                <div class="price-tag"><span class="old-p">$19.99</span> X24 FREE</div>
                <button class="btn-claim">CLAIM</button>
            </div>
            <div class="card">
                <div class="item-name">STARR NOVA<br>BOX</div>
                <img src="https://i.ibb.co/8YhG0vX/starr-box.png" class="item-img">
                <div class="price-tag"><span class="old-p">$24.99</span> X100 FREE</div>
                <button class="btn-claim">CLAIM</button>
            </div>

            </div>
    </div>

    <footer class="footer">
        <p>Terms of Service</p>
        <p>Privacy Policy</p>
        <p>Parent's Guide</p>
        <p>Safe and Fair Play Policy</p>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Supercell_logo.svg/1200px-Supercell_logo.svg.png" class="footer-logo">
        <div style="clear:both"></div>
    </footer>

</body>
</html>
