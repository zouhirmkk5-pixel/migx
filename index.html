<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Clone</title>
    <style>
        :root {
            --bs-blue: #2b5ce6;
            --bs-purple: #7e4df5;
            --bs-green: #afff00;
        }

        body {
            background-color: var(--bs-blue);
            font-family: 'Arial Black', sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            color: white; overflow-x: hidden;
        }

        /* Header Stats */
        .stats-wrapper {
            background: rgba(0,0,0,0.3); border-radius: 15px;
            display: flex; gap: 30px; padding: 10px 25px; margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .stat-item { text-align: center; font-size: 10px; }
        .stat-val { display: block; font-size: 16px; font-weight: 900; }

        /* Main Container */
        .container {
            width: 90%; max-width: 480px; background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 15px;
        }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        /* Card Design */
        .card {
            background: radial-gradient(circle, #8e66ff 0%, #4a1fbc 100%);
            border: 2px solid #a385ff; border-radius: 12px;
            padding: 10px 5px; text-align: center; cursor: pointer;
            transition: transform 0.1s;
        }
        .card:active { transform: scale(0.95); }

        .item-name { font-size: 8px; font-weight: 900; height: 22px; text-transform: uppercase; }
        .item-img { width: 100%; height: 60px; object-fit: contain; margin: 5px 0; }
        .price-line { font-size: 8px; color: var(--bs-green); font-weight: bold; }
        .old-p { text-decoration: line-through; opacity: 0.6; }

        .btn-claim {
            background: linear-gradient(180deg, #00a2ff 0%, #005fcc 100%);
            border: 1px solid #00d9ff; border-radius: 4px; color: white;
            font-size: 10px; font-weight: bold; padding: 6px 0; width: 100%;
            box-shadow: 0 3px 0 #003a80; margin-top: 5px;
        }

        /* POPUP MODAL (L-khedma dyal l-video) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .popup {
            background: #228b22; border: 4px solid #fff; border-radius: 15px;
            width: 85%; max-width: 350px; padding: 20px; text-align: center;
        }
        .popup h2 { font-size: 18px; margin-bottom: 15px; }
        .input-tag {
            width: 90%; padding: 10px; border-radius: 8px; border: none;
            font-size: 16px; margin-bottom: 15px; text-align: center;
        }
        .btn-go {
            background: #afff00; color: #000; border: none; padding: 10px 30px;
            border-radius: 8px; font-weight: 900; cursor: pointer;
        }

        /* Video tutorial sghir */
        .video-box { width: 100%; border-radius: 10px; margin: 10px 0; border: 2px solid #fff; }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/7/7a/Brawl_Stars_logo.svg/1200px-Brawl_Stars_logo.svg.png" style="width:100px; margin-top:20px;">

    <div class="stats-wrapper">
        <div class="stat-item">CLAIMS TODAY<span class="stat-val">3,110</span></div>
        <div class="stat-item">ONLINE<span class="stat-val">1,091</span></div>
    </div>

    <div class="container">
        <p style="text-align:center; font-size:12px;">CHOOSE YOUR REWARD</p>
        <div class="grid">
            <div class="card" onclick="openPopup()">
                <div class="item-name">ULTRA CHAOS DROPS</div>
                <img src="https://i.ibb.co/vzVf6n4/chaos-drop.png" class="item-img">
                <div class="price-line"><span class="old-p">$2.99</span> X6 FREE</div>
                <button class="btn-claim">CLAIM</button>
            </div>
            <div class="card" onclick="openPopup()">
                <div class="item-name">2000 GEMS</div>
                <img src="https://i.ibb.co/V2fXQzD/gems.png" class="item-img">
                <div class="price-line"><span class="old-p">$19.99</span> X24 FREE</div>
                <button class="btn-claim">CLAIM</button>
            </div>
            <div class="card" onclick="openPopup()">
                <div class="item-name">STARR NOVA BOX</div>
                <img src="https://i.ibb.co/8YhG0vX/starr-box.png" class="item-img">
                <div class="price-line"><span class="old-p">$24.99</span> X100 FREE</div>
                <button class="btn-claim">CLAIM</button>
            </div>
            </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="popup">
            <h2 style="background:#000; padding:5px;">ENTER PLAYER TAG</h2>
            <input type="text" class="input-tag" placeholder="#PLAYER TAG" id="playerTag">
            <p style="font-size:10px;">Find your tag in the upper left corner of the game.</p>
            <div style="background:#444; padding:10px; border-radius:10px; margin-bottom:10px;">
                <span style="font-size:11px;">STEP 1: LAUNCH BRAWL STARS...</span>
            </div>
            <button class="btn-go" onclick="startLoading()">LET'S GO!</button>
            <div id="loader" style="display:none; margin-top:10px;">LOADING...</div>
        </div>
    </div>

    <script>
        function openPopup() {
            document.getElementById('overlay').style.display = 'flex';
        }

        function startLoading() {
            const btn = document.querySelector('.btn-go');
            const loader = document.getElementById('loader');
            const tag = document.getElementById('playerTag').value;

            if(tag.length < 3) { alert('Please enter a valid tag!'); return; }

            btn.style.display = 'none';
            loader.style.display = 'block';

            // Simulate l-server error 404 lli kān f l-video
            setTimeout(() => {
                loader.innerHTML = "<span style='color:red'>SERVER ERROR 404</span><br>PLEASE TRY AGAIN";
                setTimeout(() => {
                    window.location.href = "https://your-cpa-link.com"; // Hna hot l-link dyal l-offers
                }, 2000);
            }, 3000);
        }
    </script>

</body>
</html>
